# Configuración del proyecto Supabase local.
# Docs: https://supabase.com/docs/guides/cli/config
project_id = "yoyo"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
# JWT de acceso: 1 semana (máximo permitido por Supabase). La sesión real la
# mantiene el refresh token mucho más tiempo (el usuario sigue logueado).
jwt_expiry = 604800
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# Registro sin verificación por ahora (ADR-02): OTP de SMS desactivado.
[auth.sms]
enable_signup = true
enable_confirmations = false

[analytics]
enabled = false
